name: Fetch Proxies

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: '0 0 * * *'
  
  # Manual run
  workflow_dispatch:
  
  # On every push to main branch
  push:
    branches:
      - main

jobs:
  fetch-proxies:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl-cffi
      
      - name: Create output directory
        run: mkdir -p output
      
      - name: Run fetch proxies script
        id: fetch
        run: |
          python scripts/01_fetch_proxies.py 2>&1 | tee fetch_proxies_log.txt || true
      
      - name: Check if proxies were fetched
        run: |
          echo "=== Checking Output Files ==="
          if [ -f output/raw_proxies.txt ]; then
            echo "✅ Raw proxies file created"
            PROXY_COUNT=$(wc -l < output/raw_proxies.txt)
            echo "📊 Total raw proxies: $PROXY_COUNT"
          else
            echo "⚠️ No raw proxies file found"
          fi
          
          if [ -f output/v2ray_config.txt ]; then
            echo "✅ V2Ray config file created"
            CONFIG_COUNT=$(wc -l < output/v2ray_config.txt)
            echo "📊 Total V2Ray configs: $CONFIG_COUNT"
          else
            echo "⚠️ No V2Ray config file found"
          fi
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add output files if they exist
          git add output/raw_proxies.txt output/v2ray_config.txt 2>/dev/null || true
          
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "🔄 Auto: Fetch proxies - $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "✅ Changes pushed successfully"
          else
            echo "ℹ️ No output files to commit"
          fi
      
      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-proxies-logs
          path: |
            fetch_proxies_log.txt
            output/raw_proxies.txt
            output/v2ray_config.txt
          retention-days: 30
